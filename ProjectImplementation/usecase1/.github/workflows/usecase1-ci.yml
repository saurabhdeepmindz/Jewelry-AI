name: Jewelry AI — Usecase1 CI

on:
  push:
    paths:
      - "ProjectImplementation/usecase1/**"
  pull_request:
    paths:
      - "ProjectImplementation/usecase1/**"

defaults:
  run:
    working-directory: ProjectImplementation/usecase1

jobs:
  # ── Lint + type check ─────────────────────────────────────────────────────
  quality:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Type check (mypy)
        run: mypy src/

  # ── Unit tests ───────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: quality
    env:
      APP_ENV: testing
      SECRET_KEY: ci-test-secret-key-32-chars-min!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jewelry_ai_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jewelry_ai_test
      REDIS_URL: redis://localhost:6379/1
      OPENAI_API_KEY: test-openai-key
      APOLLO_API_KEY: test-apollo-key
      HUNTER_API_KEY: test-hunter-key
      SENDGRID_API_KEY: test-sendgrid-key
      SENDGRID_FROM_EMAIL: test@example.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: |
          pytest tests/unit/ \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=80 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ProjectImplementation/usecase1/coverage.xml

  # ── Integration tests ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jewelry_ai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      APP_ENV: testing
      SECRET_KEY: ci-test-secret-key-32-chars-min!!
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jewelry_ai_test
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/jewelry_ai_test
      REDIS_URL: redis://localhost:6379/1
      OPENAI_API_KEY: test-openai-key
      APOLLO_API_KEY: test-apollo-key
      HUNTER_API_KEY: test-hunter-key
      SENDGRID_API_KEY: test-sendgrid-key
      SENDGRID_FROM_EMAIL: test@example.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run integration tests
        run: pytest tests/integration/ -v -m integration
