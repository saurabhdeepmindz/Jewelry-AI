[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for migration timestamps
timezone = UTC

# Max length of the "slug" field in generated filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during 'autogenerate' commands
revision_environment = false

# sqlalchemy.url is set programmatically in alembic/env.py from Settings
# Do NOT set it here — it would override the settings-based URL
# sqlalchemy.url = (set in env.py)

[post_write_hooks]
# Hooks to run after generated migration files are written
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
