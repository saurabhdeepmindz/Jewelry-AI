version: "3.9"

services:
  # ── FastAPI application ───────────────────────────────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/jewelry_ai
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery worker ─────────────────────────────────────────────────────────
  celery:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/jewelry_ai
      REDIS_URL: redis://redis:6379/0
      APP_ENV: development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src
    command: >
      celery -A src.tasks.celery_app worker
      --loglevel=info
      -Q ingestion,enrichment,outreach,ml
      --concurrency=4

  # ── PostgreSQL (with pgvector extension) ─────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jewelry_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jewelry_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── n8n workflow automation ───────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: 0.0.0.0
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://n8n:5678
      N8N_LOG_LEVEL: info
    volumes:
      - n8ndata:/home/node/.n8n

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - fastapi

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafanadata:/var/lib/grafana
      - ./src/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── MLflow tracking server ────────────────────────────────────────────────
  mlflow:
    image: python:3.11-slim
    ports:
      - "5000:5000"
    volumes:
      - mlflowdata:/mlflow
    command: >
      sh -c "pip install mlflow psycopg2-binary -q &&
             mlflow server --host 0.0.0.0 --port 5000
             --backend-store-uri /mlflow/mlruns
             --default-artifact-root /mlflow/artifacts"

volumes:
  pgdata:
  redisdata:
  n8ndata:
  prometheusdata:
  grafanadata:
  mlflowdata:
